<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Creative Lab Studio</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eaeaea;
            margin: 20px;
        }

        /* Contenedor principal */
        .contenedor {
            background-color: #dcdcdc;
            border: 2px solid #888;
            border-radius: 10px;
            padding: 20px;
            width: 600px;
        }

        /* Título */
        h1 {
            color: darkred;
            text-align: center;
            letter-spacing: 3px;
        }

        /* Párrafo */
        p {
            color: #2b7a78;
            line-height: 1.6;
        }

        /* Letra capital */
        .letra-capital {
            font-size: 32px;
            font-weight: bold;
            color: teal;
        }

        /* Imagen simulada */
        .imagen {
            border: 2px solid red;
            background-color: #cfcfcf;
            height: 150px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: gray;
            font-size: 24px;
        }

        /* Botón */
        button {
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid #444;
            background-color: #e6f2ef;
            cursor: pointer;
        }

        button:hover {
            background-color: #cde7e1;
        }

        /* Línea separadora */
        hr {
            margin: 20px 0;
            border: 1px solid #444;
        }

        /* Menú */
        nav ul {
            list-style: none;
            padding: 0;
        }

        nav li {
            margin: 8px 0;
        }

        nav a {
            text-decoration: none;
            color: blue;
            font-weight: bold;
        }

        nav a.activo {
            color: green;
        }
    </style>

</head>
<body>

    <div class="contenedor">
        <h1>CREATIVE LAB STUDIO</h1>

        <p>
            <span class="letra-capital">U</span>n espacio creativo donde mezclamos diseño,
            formación e innovación. Esta página sirve como ejemplo de una web larga para
            practicar apariencia visual completa con CSS.
        </p>

        <div class="imagen">
            Imagen principal
        </div>

        <button>Solicitar información</button>
    </div>

    <hr>

    <nav>
        <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Servicios</a></li>
            <li><a href="#">Galería</a></li>
            <li><a href="#">Video</a></li>
            <li><a href="#">Opiniones</a></li>
            <li><a href="#" class="activo">Contacto</a></li>
            <li><a href="#">Caja</a></li>
        </ul>
    </nav>

</body>
</html>
