<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo.css"></head>
<body>
     <nav>
    <a href="index.html">Inicio</a> ||
    <a href="sobrenosotros.html">Sobre Nosotros</a> ||
    <a href="productos.html">Productos</a> ||

  </nav>
<header>
    <h1>Contacto</h1>
    <hr>

    <section>
        <br>
   <div class="form-group">
  <label for="nombre">Nombre (opcional)</label>
  <input type="text" id="nombre" name="nombre" placeholder="Tu nombre">
</div>
<div class="form-group">
  <label for="email">Email *</label>
  <input type="email" id="email" name="email" placeholder="tu@email.com" required>
</div>
        
 
  <p>Tipo de consulta *</p>

  <label>
    <input type="radio" name="consulta" value="pedido" required>
    Pedido
  </label>

  <label>
    <input type="radio" name="consulta" value="envio">
    Envíos
  </label>

  <label>
    <input type="radio" name="consulta" value="devolucion">
    Devoluciones
  </label>

  <label>
    <input type="radio" name="consulta" value="tallas">
    Tallas
  </label>

  <label>
    <input type="radio" name="consulta" value="producto">
    Producto
  </label>

  <label>
    <input type="radio" name="consulta" value="otro">
    Otro
  </label>
</div>

<br><br>

    <div class="form-group">
  <label for="mensaje">¿En qué podemos ayudarte?*</label>
  <br>
  <textarea id="mensaje" name="mensaje" rows="4" placeholder="Escribe tu mensaje aquí..." required></textarea>
</div>

<br>

<div class="form-group">
  <label>
    <input type="checkbox" required>
    Acepto la <a href="#">política de privacidad</a>
  </label>
</div>


<div class="form-group">
  <button type="submit" class="btn-enviar">Enviar mensaje</button>
</div>

<br>

<footer>

</footer>
    </body>
</html>

</header>
